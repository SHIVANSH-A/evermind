<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Face Embedding</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #webcam-container {
            border: 2px solid black;
            margin-bottom: 20px;
        }
        #results {
            margin-top: 20px;
            text-align: left;
            width: 100%;
            max-width: 600px;
        }
        #embedding-output {
            width: 100%;
            height: 150px;
            margin-top: 10px;
            resize: none;
            font-family: monospace;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Face Embedding Generator</h1>
    <div id="webcam-container">
        <video id="webcam-video" width="640" height="480" autoplay muted></video>
    </div>
    <button id="generate-btn">Generate Embedding</button>

    <div id="results">
        <h2>Embedding Output:</h2>
        <p id="status-message">Loading models...</p>
        <textarea id="embedding-output" readonly></textarea>
        <p>Copy the JSON array above and paste it into your Supabase database.</p>
    </div>

    <script>
        const video = document.getElementById('webcam-video');
        const generateBtn = document.getElementById('generate-btn');
        const statusMessage = document.getElementById('status-message');
        const embeddingOutput = document.getElementById('embedding-output');
        
        let modelsLoaded = false;
        
        // Corrected URL for the models
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';

        // Load models from the web
        async function loadModels() {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                modelsLoaded = true;
                statusMessage.textContent = "Models loaded. Click 'Generate Embedding' to start.";
                generateBtn.disabled = false;
            } catch (error) {
                console.error("Error loading models:", error);
                statusMessage.textContent = "Failed to load models. Check your network connection or the model URL.";
                generateBtn.disabled = true;
            }
        }

        // Start webcam stream
        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing webcam:", err);
                statusMessage.textContent = "Error: Could not access webcam. Please allow access.";
                generateBtn.disabled = true;
            }
        }

        // Handle embedding generation
        async function generateEmbedding() {
            if (!modelsLoaded) return;

            statusMessage.textContent = "Detecting face...";
            generateBtn.disabled = true;

            const detection = await faceapi
                .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();

            if (!detection) {
                statusMessage.textContent = "No face detected. Please try again.";
                generateBtn.disabled = false;
                embeddingOutput.value = "";
                return;
            }

            const embedding = Array.from(detection.descriptor);
            statusMessage.textContent = "Embedding generated!";
            embeddingOutput.value = JSON.stringify(embedding);

            generateBtn.disabled = false;
        }

        // Event listeners
        video.addEventListener('play', () => {
            statusMessage.textContent = "Starting...";
            generateBtn.disabled = true;
            loadModels();
        });

        generateBtn.addEventListener('click', generateEmbedding);
        
        startWebcam();
    </script>
</body>
</html>
